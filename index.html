<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Rence Verse | Poetry Studio</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1E293B">
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/Rence-Verse/sw.js')
                    .then(reg => console.log('✅ SW registered:', reg))
                    .catch(err => console.log('❌ SW error:', err));
            });
        }
    </script>
    <meta name="apple-mobile-web-app-title" content="Rence Verse">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="images/renceverse_logo.png">
    <meta name="msapplication-TileImage" content="images/renceverse_logo.png">
    <meta name="msapplication-TileColor" content="#1E293B">
    <link rel="icon" type="image/png" href="images/renceverse_logo.png">
    <link rel="apple-touch-icon" href="images/renceverse_logo.png">

        <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:#F1F5F9;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
        .app{max-width:550px;width:100%;margin:0 auto;background:#FFFFFF;min-height:100vh;display:flex;flex-direction:column;box-shadow:0 0 40px rgba(0,0,0,0.05)}
        .app-header{padding:18px 20px 12px 20px;display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid #EFF3F8;background:white}
        .logo-link{text-decoration:none;display:inline-block;transition:opacity 0.2s}
        .logo-link:active{opacity:0.7}
        .title-section h1{font-size:1.55rem;background:linear-gradient(135deg,#1E293B,#F59E0B);-webkit-background-clip:text;background-clip:text;color:transparent}
        .save-btn-top{background:#1E293B;border:none;border-radius:32px;padding:6px 14px;color:white;font-weight:500;font-size:0.7rem;cursor:pointer;transition:all 0.2s ease;min-width:70px}
        .save-btn-top:active{transform:scale(0.95)}
        .canvas-container{padding:24px 20px;background:#FAFCFE;display:flex;justify-content:center;overflow-x:auto}
        #poemCanvas{display:block;width:100%;height:auto;background:white;border-radius:20px;box-shadow:0 6px 14px rgba(0,0,0,0.05);cursor:grab;touch-action:none}
        #poemCanvas:active{cursor:grabbing}
        .action-buttons-row{display:flex;gap:12px;justify-content:center;margin:8px 0 4px;flex-wrap:wrap}
        .edit-tap-btn{background:#F59E0B;border:none;border-radius:40px;padding:4px 12px;color:white;font-weight:500;font-size:0.7rem;cursor:pointer}
        .edit-tap-btn:active{transform:scale(0.95)}
        .tap-hint{text-align:center;margin-top:4px;font-size:0.7rem;color:#475569;background:#F1F5F9;padding:6px 14px;border-radius:60px;display:inline-block}
        .bottom-tabs{background:white;border-top:1px solid #EDF2F7;display:flex;padding:4px 20px 0;gap:20px}
        .tab-btn{flex:1;background:transparent;border:none;padding:12px 0 10px;font-size:0.85rem;font-weight:600;color:#94A3B8;border-bottom:2px solid transparent}
        .tab-btn.active{color:#F59E0B;border-bottom:2px solid #F59E0B}
        .settings-panel{background:white;padding:0 20px;max-height:0;overflow:hidden;transition:max-height 0.4s;border-bottom:1px solid transparent}
        .settings-panel.open{max-height:650px;padding:16px 20px 24px;border-bottom:1px solid #EDF2F7;overflow-y:auto}
        .style-group{background:#F8FAFE;border-radius:28px;padding:16px 18px;margin-bottom:16px}
        .style-label{font-size:0.7rem;font-weight:700;text-transform:uppercase;color:#5B6E8C;margin-bottom:14px}
        .controls-row{display:flex;flex-wrap:wrap;gap:14px;align-items:center}
        .ctrl-item{display:flex;align-items:center;gap:10px;background:white;padding:6px 14px;border-radius:48px;border:1px solid #E2E8F0}
        input[type="color"]{width:38px;height:38px;border-radius:30px;cursor:pointer}
        select,input[type="range"]{background:white;border:1px solid #E2E8F0;border-radius:40px;padding:6px 14px}
        .layer-list{display:flex;flex-direction:column;gap:12px;margin-top:10px}
        .layer-item{display:flex;align-items:center;justify-content:space-between;background:white;padding:12px 16px;border-radius:60px;border:1px solid #E2E8F0;flex-wrap:wrap}
        .layer-info{display:flex;align-items:center;gap:12px;flex:2}
        .layer-name{font-weight:600;background:#F1F5F9;padding:6px 14px;border-radius:30px;cursor:pointer}
        .edit-layer-btn{background:#F59E0B!important;color:white!important}
        .delete-layer-btn{background:#FEE2E2!important;color:#DC2626!important}
        .add-layer-btn{background:#1E293B;color:white;border-radius:60px;padding:12px 16px;font-weight:600;width:100%;cursor:pointer}
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:1000;align-items:center;justify-content:center;padding:20px}
        .modal-card{background:#1E293B;border-radius:40px;width:100%;padding:28px}
        .modal-card textarea{width:100%;background:#0F172A;border:1px solid #334155;border-radius:28px;padding:18px;color:white;font-family:Georgia,serif}
        .modal-save{background:#F59E0B;border-radius:60px;padding:14px;font-weight:bold;cursor:pointer}
        .modal-cancel{background:#334155;border-radius:60px;padding:14px;color:white;cursor:pointer}
        .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1E293B;color:white;padding:12px 24px;border-radius:60px;opacity:0;transition:opacity 0.25s;pointer-events:none}
    </style>
</head>
<body>
<div class="app">
    <div class="app-header">
        <a href="images/" class="logo-link"><div class="title-section"><h1>Rence Verse</h1></div></a>
        <button id="topSaveBtn" class="save-btn-top">💾 Save PNG</button>
    </div>
    <div class="canvas-container"><canvas id="poemCanvas" width="500" height="500" style="width:100%;height:auto;"></canvas></div>
    <div class="action-buttons-row"><button id="bigEditBtn" class="edit-tap-btn">✏️ Edit Text</button></div>
    <div style="display:flex;justify-content:center"><div class="tap-hint">💡 Double-tap text or tap orange button to edit</div></div>

        <div class="bottom-tabs">
        <button id="tabTypography" class="tab-btn active">✏️ Typography</button>
        <button id="tabLayers" class="tab-btn">📑 Layers</button>
        <button id="tabBackground" class="tab-btn">🎨 Background</button>
    </div>
    <div id="typographyPanel" class="settings-panel open">
        <div class="style-group">
            <div class="style-label">🎯 Active Layer: <span id="activeLayerName">Main Poem</span></div>
            <div class="controls-row">
                <div class="ctrl-item"><span>Color</span><input type="color" id="textColorPicker" value="#1E293B"></div>
                <div class="ctrl-item"><span>Size</span><input type="range" id="fontSizeSlider" min="12" max="72" value="26"><span id="sizeDisplay">26</span></div>
                <div class="ctrl-item"><span>Font</span><select id="fontSelect"><option value="'Georgia', serif">Georgia</option><option value="'Times New Roman', serif">Times New Roman</option><option value="'Garamond', serif">Garamond</option></select></div>
                <div class="ctrl-item"><span>Align</span><select id="alignSelect"><option value="center">Center</option><option value="left">Left</option><option value="right">Right</option></select></div>
                <div class="ctrl-item"><span>Indent</span><input type="range" id="indentSlider" min="0" max="80" value="0"><span id="indentDisplay">0px</span></div>
            </div>
            <div class="controls-row" style="margin-top:12px">
                <div class="ctrl-item"><span>📍 X Offset</span><input type="range" id="xOffsetSlider" min="-500" max="500" value="0"><span id="xOffsetDisplay">0px</span></div>
                <div class="ctrl-item"><span>📍 Y Offset</span><input type="range" id="yOffsetSlider" min="-500" max="500" value="0"><span id="yOffsetDisplay">0px</span></div>
                <button id="resetPositionBtn" style="background:#E2E8F0;border:none;border-radius:40px;padding:6px 16px;cursor:pointer">⟳ Reset</button>
            </div>
        </div>
    </div>
    <div id="layersPanel" class="settings-panel">
        <div class="style-group">
            <div class="style-label">📄 Text Layers (click ✏️ to edit)</div>
            <div id="layersListContainer" class="layer-list"></div>
            <button id="addNewLayerBtn" class="add-layer-btn">+ Add New Text Layer</button>
        </div>
    </div>
    <div id="backgroundPanel" class="settings-panel">
        <div class="style-group">
            <div class="style-label">🎨 Background Mode</div>
            <div class="controls-row" style="gap:12px;margin-bottom:16px">
                <button id="solidModeBtn" class="bg-mode-chip active">🎨 Solid</button>
                <button id="gradientModeBtn" class="bg-mode-chip">🌈 Gradient</button>
                <button id="imageModeBtn" class="bg-mode-chip">🖼️ Image</button>
            </div>
            <div id="solidBgArea"><div class="ctrl-item"><span>Color</span><input type="color" id="solidBgColor" value="#FAF7F2"></div></div>
            <div id="gradientBgArea" style="display:none">
                <div class="controls-row"><div class="ctrl-item"><span>A</span><input type="color" id="gradA" value="#FDFBF7"></div><div class="ctrl-item"><span>B</span><input type="color" id="gradB" value="#E9ECEF"></div><select id="gradDirSelect"><option value="to right">→ Left to Right</option><option value="to bottom">↓ Top to Bottom</option><option value="135deg">↘ Diagonal</option></select></div>
            </div>
            <div id="imageBgArea" style="display:none">
                <div class="upload-area-sm" id="imageUploadTrigger">📸 Select Image</div>
                <input type="file" id="imageFileInput" accept="image/*" style="display:none">
                <button id="clearImageBgBtn" style="margin-top:12px;padding:8px;width:100%;border-radius:60px;cursor:pointer">✖ Remove Image</button>
            </div>
        </div>
    </div>
    <div id="poemModal" class="modal-overlay">
        <div class="modal-card"><h3>✍️ Edit: <span id="modalLayerName"></span></h3><textarea id="poemEditorText" rows="8"></textarea><div class="modal-actions"><button id="modalSaveBtn" class="modal-save">✓ Save</button><button id="modalCancelBtn" class="modal-cancel">Cancel</button></div></div>
    </div>
</div>
<div id="toast" class="toast"></div>

    <script>
let layers=[],activeLayerId=null,nextId=1,currentBgMode='solid',loadedImage=null;
let isDraggingLayer=false,dragStartMouseCanvasX=0,dragStartMouseCanvasY=0,dragStartLayerXOffset=0,dragStartLayerYOffset=0,currentlyDraggedLayerId=null;
const canvas=document.getElementById('poemCanvas');let ctx=canvas.getContext('2d');
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2000);}
function getLinesWithIndent(text,ctx,maxWidth,fontSize,fontFamily,indentPx){const paragraphs=text.split(/\r?\n/);const lines=[];for(let para of paragraphs){if(para.trim()===""){lines.push("");continue;}const words=para.split(/\s+/);let currentLine="";for(let w of words){let testLine=currentLine?currentLine+" "+w:w;let metrics=ctx.measureText(testLine);if(metrics.width>maxWidth-indentPx&&currentLine!==""){lines.push(currentLine);currentLine=w;}else{currentLine=testLine;}}if(currentLine)lines.push(currentLine);}return lines;}
function renderCanvas(){const width=500;let minX=0,maxX=width,minY=0,maxY=400;for(let layer of layers){const tempCtx=canvas.getContext('2d');tempCtx.font=`${layer.fontSize}px ${layer.fontFamily}`;const lines=getLinesWithIndent(layer.text,tempCtx,width-70,layer.fontSize,layer.fontFamily,layer.indent);const lineHeight=layer.fontSize*1.55;const totalTextH=lines.length*lineHeight;let baseX;if(layer.align==='center')baseX=width/2+(layer.xOffset||0);else if(layer.align==='left')baseX=45+layer.indent+(layer.xOffset||0);else baseX=width-45-layer.indent+(layer.xOffset||0);let maxLineWidth=0;for(let line of lines){const metrics=tempCtx.measureText(line);maxLineWidth=Math.max(maxLineWidth,metrics.width);}const layerLeft=baseX-maxLineWidth/2;const layerRight=baseX+maxLineWidth/2;let baseY=(canvas.height-totalTextH)/2;if(baseY<40)baseY=45;baseY+=(layer.yOffset||0);minX=Math.min(minX,layerLeft-50);maxX=Math.max(maxX,layerRight+50);minY=Math.min(minY,baseY-50);maxY=Math.max(maxY,baseY+totalTextH+50);}const finalWidth=Math.max(500,Math.min(1200,maxX-minX+200));const finalHeight=Math.max(500,maxY-minY+150);if(canvas.width!==finalWidth||canvas.height!==finalHeight){canvas.width=finalWidth;canvas.height=finalHeight;ctx=canvas.getContext('2d');}if(currentBgMode==='solid'){ctx.fillStyle=document.getElementById('solidBgColor').value;ctx.fillRect(0,0,canvas.width,canvas.height);}else if(currentBgMode==='gradient'){let grad;const dir=document.getElementById('gradDirSelect').value;if(dir==='to right')grad=ctx.createLinearGradient(0,0,canvas.width,0);else if(dir==='to bottom')grad=ctx.createLinearGradient(0,0,0,canvas.height);else grad=ctx.createLinearGradient(0,0,canvas.width,canvas.height);grad.addColorStop(0,document.getElementById('gradA').value);grad.addColorStop(1,document.getElementById('gradB').value);ctx.fillStyle=grad;ctx.fillRect(0,0,canvas.width,canvas.height);}else if(currentBgMode==='image'&&loadedImage){ctx.drawImage(loadedImage,0,0,canvas.width,canvas.height);}else if(currentBgMode==='image'){ctx.fillStyle="#F1F5F9";ctx.fillRect(0,0,canvas.width,canvas.height);}for(let layer of layers){ctx.save();ctx.font=`${layer.fontSize}px ${layer.fontFamily}`;ctx.fillStyle=layer.color;ctx.textAlign=layer.align;const maxWidth=canvas.width-70;const lines=getLinesWithIndent(layer.text,ctx,maxWidth,layer.fontSize,layer.fontFamily,layer.indent);const lineHeight=layer.fontSize*1.55;const totalTextH=lines.length*lineHeight;let baseY=(canvas.height-totalTextH)/2;if(baseY<40)baseY=45;baseY+=(layer.yOffset||0);const xOffset=layer.xOffset||0;for(let i=0;i<lines.length;i++){if(lines[i]==="")continue;let x;if(layer.align==='center')x=canvas.width/2+xOffset;else if(layer.align==='left')x=45+layer.indent+xOffset;else x=canvas.width-45-layer.indent+xOffset;ctx.fillText(lines[i],x,baseY+i*lineHeight);}ctx.restore();}}
function updateActiveLayerUI(){if(!activeLayerId)return;const layer=layers.find(l=>l.id===activeLayerId);if(layer){document.getElementById('activeLayerName').innerHTML=layer.name;document.getElementById('textColorPicker').value=layer.color;document.getElementById('fontSizeSlider').value=layer.fontSize;document.getElementById('sizeDisplay').innerText=layer.fontSize;document.getElementById('fontSelect').value=layer.fontFamily;document.getElementById('alignSelect').value=layer.align;document.getElementById('indentSlider').value=layer.indent;document.getElementById('indentDisplay').innerText=layer.indent+'px';document.getElementById('xOffsetSlider').value=layer.xOffset||0;document.getElementById('xOffsetDisplay').innerText=(layer.xOffset||0)+'px';document.getElementById('yOffsetSlider').value=layer.yOffset||0;document.getElementById('yOffsetDisplay').innerText=(layer.yOffset||0)+'px';}refreshLayersList();renderCanvas();}
function updateActiveLayerStyle(){if(!activeLayerId)return;const layer=layers.find(l=>l.id===activeLayerId);if(layer){layer.color=document.getElementById('textColorPicker').value;layer.fontSize=parseInt(document.getElementById('fontSizeSlider').value);layer.fontFamily=document.getElementById('fontSelect').value;layer.align=document.getElementById('alignSelect').value;layer.indent=parseInt(document.getElementById('indentSlider').value);renderCanvas();saveToLocalStorage();refreshLayersList();}}
function setActiveLayer(id){activeLayerId=id;updateActiveLayerUI();saveToLocalStorage();refreshLayersList();showToast(`Active: ${layers.find(l=>l.id===id)?.name}`);}
function deleteLayer(id){if(layers.length===1){showToast("Cannot delete last layer");return;}const idx=layers.findIndex(l=>l.id===id);if(idx!==-1){layers.splice(idx,1);if(activeLayerId===id)activeLayerId=layers[0]?.id||null;if(activeLayerId)updateActiveLayerUI();renderCanvas();saveToLocalStorage();refreshLayersList();showToast("Layer deleted");}}
function addNewLayer(){const newId=nextId++;const newLayer={id:newId,name:`Layer ${layers.length+1}`,text:"New poetic line\nFlowing freely.",color:"#F59E0B",fontSize:22,fontFamily:"'Georgia', serif",align:"center",indent:0,xOffset:0,yOffset:20};layers.push(newLayer);setActiveLayer(newId);renderCanvas();saveToLocalStorage();showToast(`Added ${newLayer.name}`);refreshLayersList();}
function refreshLayersList(){const container=document.getElementById('layersListContainer');if(!container)return;container.innerHTML='';layers.forEach(layer=>{const div=document.createElement('div');div.className='layer-item';div.innerHTML=`<div class="layer-info"><span class="layer-name" data-id="${layer.id}">${escapeHtml(layer.name)}</span><span style="font-size:0.7rem;color:#64748B;">${layer.text.substring(0,22)}${layer.text.length>22?'…':''}</span></div><div class="layer-controls"><button class="edit-layer-btn" data-id="${layer.id}">✏️ Edit</button><button class="delete-layer-btn" data-id="${layer.id}">🗑️</button></div>`;container.appendChild(div);});document.querySelectorAll('.layer-name').forEach(span=>{span.addEventListener('click',(e)=>{setActiveLayer(parseInt(span.dataset.id));});});document.querySelectorAll('.edit-layer-btn').forEach(btn=>{btn.addEventListener('click',(e)=>{e.stopPropagation();const layerId=parseInt(btn.dataset.id);const layer=layers.find(l=>l.id===layerId);if(layer){setActiveLayer(layerId);editActiveLayerText();}});});document.querySelectorAll('.delete-layer-btn').forEach(btn=>{btn.addEventListener('click',(e)=>{e.stopPropagation();deleteLayer(parseInt(btn.dataset.id));});});}
function editActiveLayerText(){if(!activeLayerId){showToast("Please select a layer first");return;}const layer=layers.find(l=>l.id===activeLayerId);if(layer){document.getElementById('modalLayerName').innerText=layer.name;document.getElementById('poemEditorText').value=layer.text;document.getElementById('poemModal').style.display='flex';}}
function saveLayerTextFromModal(){if(activeLayerId){const layer=layers.find(l=>l.id===activeLayerId);if(layer){layer.text=document.getElementById('poemEditorText').value;renderCanvas();saveToLocalStorage();refreshLayersList();showToast(`Updated ${layer.name}`);}}document.getElementById('poemModal').style.display='none';}
function escapeHtml(str){return str.replace(/[&<>]/g,function(m){return m==='&'?'&amp;':m==='<'?'&lt;':'&gt;';});}
function getCanvasCoords(e){const rect=canvas.getBoundingClientRect();const scaleX=canvas.width/rect.width,scaleY=canvas.height/rect.height;let clientX,clientY;if(e.touches){clientX=e.touches[0].clientX;clientY=e.touches[0].clientY;}else{clientX=e.clientX;clientY=e.clientY;}return{canvasX:(clientX-rect.left)*scaleX,canvasY:(clientY-rect.top)*scaleY};}
function onDragStart(e){if(!activeLayerId)return;const{canvasX,canvasY}=getCanvasCoords(e);isDraggingLayer=true;currentlyDraggedLayerId=activeLayerId;const layer=layers.find(l=>l.id===currentlyDraggedLayerId);if(layer){dragStartLayerXOffset=layer.xOffset||0;dragStartLayerYOffset=layer.yOffset||0;dragStartMouseCanvasX=canvasX;dragStartMouseCanvasY=canvasY;}canvas.style.cursor='grabbing';e.preventDefault();}
function onDragMove(e){if(!isDraggingLayer||!currentlyDraggedLayerId)return;const{canvasX,canvasY}=getCanvasCoords(e);let deltaX=canvasX-dragStartMouseCanvasX;let deltaY=canvasY-dragStartMouseCanvasY;const layer=layers.find(l=>l.id===currentlyDraggedLayerId);if(layer){layer.xOffset=Math.round(dragStartLayerXOffset+deltaX);layer.yOffset=Math.round(dragStartLayerYOffset+deltaY);document.getElementById('xOffsetSlider').value=layer.xOffset;document.getElementById('xOffsetDisplay').innerText=layer.xOffset+'px';document.getElementById('yOffsetSlider').value=layer.yOffset;document.getElementById('yOffsetDisplay').innerText=layer.yOffset+'px';renderCanvas();saveToLocalStorage();}e.preventDefault();}
function onDragEnd(e){if(isDraggingLayer){isDraggingLayer=false;currentlyDraggedLayerId=null;canvas.style.cursor='grab';saveToLocalStorage();}e.preventDefault();}
canvas.addEventListener('mousedown',onDragStart);window.addEventListener('mousemove',(e)=>{if(isDraggingLayer)onDragMove(e);});window.addEventListener('mouseup',onDragEnd);canvas.addEventListener('touchstart',onDragStart,{passive:false});canvas.addEventListener('touchmove',onDragMove,{passive:false});canvas.addEventListener('touchend',onDragEnd);canvas.addEventListener('touchcancel',onDragEnd);
let lastTap=0;canvas.addEventListener('click',(e)=>{const currentTime=new Date().getTime();const tapLength=currentTime-lastTap;if(tapLength<300&&tapLength>0){editActiveLayerText();e.preventDefault();}lastTap=currentTime;});
function setBackgroundMode(mode){currentBgMode=mode;document.getElementById('solidBgArea').style.display=mode==='solid'?'block':'none';document.getElementById('gradientBgArea').style.display=mode==='gradient'?'block':'none';document.getElementById('imageBgArea').style.display=mode==='image'?'block':'none';renderCanvas();saveToLocalStorage();}
function savePoemImage(){try{renderCanvas();const link=document.createElement('a');link.download=`rence_verse_${Date.now()}.png`;link.href=canvas.toDataURL('image/png');link.click();showToast("✅ Saved!");}catch(e){showToast("❌ Save failed");}}
function saveToLocalStorage(){const saveData={layers,currentBgMode,solidBg:document.getElementById('solidBgColor').value,gradA:document.getElementById('gradA').value,gradB:document.getElementById('gradB').value,gradDir:document.getElementById('gradDirSelect').value,activeLayerId};localStorage.setItem('rence_verse_full',JSON.stringify(saveData));}
function loadFromStorage(){const saved=localStorage.getItem('rence_verse_full');if(saved){try{const data=JSON.parse(saved);if(data.layers&&data.layers.length){layers=data.layers;nextId=Math.max(...layers.map(l=>l.id),0)+1;activeLayerId=data.activeLayerId||layers[0]?.id;if(data.currentBgMode)setBackgroundMode(data.currentBgMode);document.getElementById('solidBgColor').value=data.solidBg||"#FAF7F2";document.getElementById('gradA').value=data.gradA||"#FDFBF7";document.getElementById('gradB').value=data.gradB||"#E9ECEF";document.getElementById('gradDirSelect').value=data.gradDir||"to right";}else throw new Error();}catch(e){initDefaultLayers();}}else{initDefaultLayers();}refreshLayersList();if(activeLayerId)updateActiveLayerUI();renderCanvas();}
function initDefaultLayers(){layers=[{id:1,name:"Main Poem",text:"When love finds you well,\nno man is a burden.\nYou don't feel empty,\nyou don't feel lonely...",color:"#1E293B",fontSize:26,fontFamily:"'Georgia', serif",align:"center",indent:0,xOffset:0,yOffset:0}];nextId=2;activeLayerId=1;}
function loadImageFile(file){const reader=new FileReader();reader.onload=(e)=>{const img=new Image();img.onload=()=>{loadedImage=img;if(currentBgMode==='image')renderCanvas();saveToLocalStorage();};img.src=e.target.result;};reader.readAsDataURL(file);}
function togglePanel(panel,tabBtn){const isOpen=panel.classList.contains('open');document.getElementById('typographyPanel').classList.remove('open');document.getElementById('layersPanel').classList.remove('open');document.getElementById('backgroundPanel').classList.remove('open');document.getElementById('tabTypography').classList.remove('active');document.getElementById('tabLayers').classList.remove('active');document.getElementById('tabBackground').classList.remove('active');if(!isOpen){panel.classList.add('open');tabBtn.classList.add('active');}}
document.getElementById('tabTypography').addEventListener('click',()=>togglePanel(document.getElementById('typographyPanel'),document.getElementById('tabTypography')));document.getElementById('tabLayers').addEventListener('click',()=>togglePanel(document.getElementById('layersPanel'),document.getElementById('tabLayers')));document.getElementById('tabBackground').addEventListener('click',()=>togglePanel(document.getElementById('backgroundPanel'),document.getElementById('tabBackground')));
document.getElementById('topSaveBtn').addEventListener('click',savePoemImage);document.getElementById('addNewLayerBtn').addEventListener('click',addNewLayer);document.getElementById('bigEditBtn').addEventListener('click',editActiveLayerText);document.getElementById('modalSaveBtn').addEventListener('click',saveLayerTextFromModal);document.getElementById('modalCancelBtn').addEventListener('click',()=>document.getElementById('poemModal').style.display='none');document.getElementById('poemModal').addEventListener('click',(e)=>{if(e.target===document.getElementById('poemModal'))document.getElementById('poemModal').style.display='none';});
document.getElementById('textColorPicker').addEventListener('input',updateActiveLayerStyle);document.getElementById('fontSizeSlider').addEventListener('input',()=>{document.getElementById('sizeDisplay').innerText=document.getElementById('fontSizeSlider').value;updateActiveLayerStyle();});document.getElementById('fontSelect').addEventListener('change',updateActiveLayerStyle);document.getElementById('alignSelect').addEventListener('change',updateActiveLayerStyle);document.getElementById('indentSlider').addEventListener('input',()=>{document.getElementById('indentDisplay').innerText=document.getElementById('indentSlider').value+'px';updateActiveLayerStyle();});document.getElementById('xOffsetSlider').addEventListener('input',(e)=>{if(activeLayerId){const layer=layers.find(l=>l.id===activeLayerId);if(layer){layer.xOffset=parseInt(e.target.value);document.getElementById('xOffsetDisplay').innerText=e.target.value+'px';renderCanvas();saveToLocalStorage();}}});document.getElementById('yOffsetSlider').addEventListener('input',(e)=>{if(activeLayerId){const layer=layers.find(l=>l.id===activeLayerId);if(layer){layer.yOffset=parseInt(e.target.value);document.getElementById('yOffsetDisplay').innerText=e.target.value+'px';renderCanvas();saveToLocalStorage();}}});document.getElementById('resetPositionBtn').addEventListener('click',()=>{if(activeLayerId){const layer=layers.find(l=>l.id===activeLayerId);if(layer){layer.xOffset=0;layer.yOffset=0;document.getElementById('xOffsetSlider').value=0;document.getElementById('xOffsetDisplay').innerText='0px';document.getElementById('yOffsetSlider').value=0;document.getElementById('yOffsetDisplay').innerText='0px';renderCanvas();saveToLocalStorage();showToast("Position reset");}}});
document.getElementById('solidBgColor').addEventListener('input',()=>{if(currentBgMode==='solid')renderCanvas();saveToLocalStorage();});document.getElementById('gradA').addEventListener('input',()=>{if(currentBgMode==='gradient')renderCanvas();saveToLocalStorage();});document.getElementById('gradB').addEventListener('input',()=>{if(currentBgMode==='gradient')renderCanvas();saveToLocalStorage();});document.getElementById('gradDirSelect').addEventListener('change',()=>{if(currentBgMode==='gradient')renderCanvas();saveToLocalStorage();});document.getElementById('solidModeBtn').addEventListener('click',()=>setBackgroundMode('solid'));document.getElementById('gradientModeBtn').addEventListener('click',()=>setBackgroundMode('gradient'));document.getElementById('imageModeBtn').addEventListener('click',()=>setBackgroundMode('image'));document.getElementById('imageUploadTrigger').addEventListener('click',()=>document.getElementById('imageFileInput').click());document.getElementById('imageFileInput').addEventListener('change',(e)=>{if(e.target.files[0])loadImageFile(e.target.files[0]);});document.getElementById('clearImageBgBtn').addEventListener('click',()=>{loadedImage=null;if(currentBgMode==='image')renderCanvas();saveToLocalStorage();});
loadFromStorage();canvas.style.cursor='grab';
</script>
</body>
</html>
